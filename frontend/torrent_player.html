<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>KinoVibe - Torrent Player</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.min.js"></script>
  <style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#080812;color:#c0c8e0;font-family:-apple-system,sans-serif;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  #status{text-align:center;padding:24px 32px;max-width:480px;width:100%;}
  .logo{font-size:40px;margin-bottom:16px;filter:drop-shadow(0 0 12px rgba(0,212,255,.5));}
  #title{font-size:15px;font-weight:700;color:#e0e8ff;margin-bottom:6px;word-break:break-word;}
  #msg{font-size:13px;color:#5a6080;margin-bottom:20px;}
  .pt{width:100%;height:6px;background:#1a1a2e;border-radius:6px;overflow:hidden;margin-bottom:16px;}
  .pf{height:100%;width:0%;background:linear-gradient(90deg,#00d4ff,#7b5ea7);border-radius:6px;transition:width .4s;}
  #eb{display:none;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.3);border-radius:10px;padding:16px;font-size:12px;color:#ff6060;}
  #pw{width:100%;height:100vh;display:none;background:#000;}
  #pw video{width:100%;height:100%;object-fit:contain;}
  :root{--plyr-color-main:#00d4ff;}
  .plyr--video{height:100vh;}
  </style>
</head>
<body>
<div id="status">
  <div class="logo">&#127754;</div>
  <div id="title">Инициализация плеера…</div>
  <div id="msg">Подключаемся к TorrServer</div>
  <div class="pt"><div class="pf" id="pbar"></div></div>
  <div id="eb"></div>
</div>
<div id="pw"><video id="video" playsinline></video></div>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var magnet=p.get('magnet'),hashParam=p.get('hash');
  var idx=parseInt(p.get('index')||'1',10);
  var title=decodeURIComponent(p.get('title')||'');
  var TS=location.origin+'/torrserver';
  var sEl=document.getElementById('status');
  var pw=document.getElementById('pw');
  var tEl=document.getElementById('title');
  var mEl=document.getElementById('msg');
  var bar=document.getElementById('pbar');
  var eb=document.getElementById('eb');
  var vid=document.getElementById('video');
  function showErr(m){mEl.textContent='Ошибка';eb.style.display='block';eb.textContent=m;}
  function prog(n){bar.style.width=n+'%';}
  function startPlayer(url,t){
    tEl.textContent=t||'Видео';mEl.textContent='Запуск плеера…';prog(100);
    setTimeout(function(){
      sEl.style.display='none';pw.style.display='block';
      var pl=new Plyr(vid,{
        controls:['play-large','play','rewind','fast-forward','progress','current-time','duration','mute','volume','settings','pip','fullscreen'],
        seekTime:10,tooltips:{controls:true,seek:true}
      });
      if(url.indexOf('.m3u8')>-1){
        if(typeof Hls!=='undefined'&&Hls.isSupported()){
          var hls=new Hls();hls.loadSource(url);hls.attachMedia(vid);
          hls.on(Hls.Events.MANIFEST_PARSED,function(){pl.play();});
          hls.on(Hls.Events.ERROR,function(e,d){if(d.fatal)showErr('HLS:'+d.details);});
        }else if(vid.canPlayType('application/vnd.apple.mpegurl')){vid.src=url;pl.play();}
        else showErr('HLS не поддерживается');
      } else {
        // Прямой HTTP TorrServer: Range-запросы, перемотка работает
        vid.src=url;pl.play();
      }
    },400);
  }
  async function addAndStream(mag,fi,t){
    tEl.textContent=t||'Загрузка…';
    mEl.textContent='Добавляем в TorrServer…';prog(20);
    try{
      var r=await fetch(TS+'/torrents',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'add',link:mag,title:t||'stream',save_to_db:false})
      });
      if(!r.ok)throw new Error('add '+r.status);
      var tor=await r.json();var h=tor.hash;
      mEl.textContent='Ожидаем метаданные…';prog(40);
      var i=0,s=0;
      while(s<2&&i<30){
        await new Promise(function(res){setTimeout(res,1000);});
        try{
          var ir=await fetch(TS+'/torrents',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({action:'get',hash:h})});
          if(ir.ok){var inf=await ir.json();s=inf.stat||0;}
        }catch(e){}
        i++;prog(40+i);
      }
      if(s<2)throw new Error('TorrServer не ответил за 30с');
      startPlayer(TS+'/stream?link='+h+'&index='+fi+'&play',t||tor.title||'Видео');
    }catch(e){showErr(e.message);}
  }
  if(hashParam){
    prog(80);mEl.textContent='Открываем поток…';
    startPlayer(TS+'/stream?link='+hashParam+'&index='+idx+'&play',title);
  } else if(magnet){
    addAndStream(magnet,idx,title);
  } else {
    showErr('Не передан magnet или hash. Используйте ?magnet=... или ?hash=...&index=1');
  }
})();
</script>
</body>
</html>
